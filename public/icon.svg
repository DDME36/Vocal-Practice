<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad)"/>
  
  <!-- Microphone icon -->
  <g transform="translate(256, 256)">
    <!-- Mic body -->
    <rect x="-40" y="-120" width="80" height="140" rx="40" fill="white"/>
    
    <!-- Mic stand -->
    <line x1="0" y1="20" x2="0" y2="100" stroke="white" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Mic base -->
    <line x1="-50" y1="100" x2="50" y2="100" stroke="white" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Mic arc -->
    <path d="M -80 -20 Q -80 20 -40 20" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <path d="M 80 -20 Q 80 20 40 20" fill="none" stroke="white" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Sound waves -->
    <path d="M -120 -60 Q -140 -60 -140 -80" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <path d="M 120 -60 Q 140 -60 140 -80" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
